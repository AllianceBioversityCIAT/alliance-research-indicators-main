<p-dialog [position]="'topright'" header="Edit Profile" [(visible)]="this.showModal" [style]="{ width: '25rem' }">
  @if (websocket; as ws) {
    @for (user of ws.userList(); track $index) {
      <div class="user-info">
        {{ user.name }} <span class="socket-uuid">{{ user.socketId }}</span>
        <div class="tag">{{ user.platform }}</div>
      </div>
      <br />
    }
    <h3>Room {{ ws.currentRoom().id }}</h3>
    @for (roomUser of ws.currentRoom().userList; track $index) {
      <div class="user-info">
        {{ roomUser.name }} <span class="socket-uuid">{{ roomUser.socketId }}</span>
        <div class="tag">{{ roomUser.platform }}</div>
      </div>
      <br />
    }
  }
</p-dialog>
