<div class="input-container flex flex-col gap-3 pt-1">
  @if (leafSections().length) {
  <app-json-structure-editor [nodes]="leafSections()" [values]="values()" [disabled]="disabled()" [depth]="0"
    (fieldChange)="fieldChange.emit($event)" />
  }

  @if (groupSections().length) {
  <div class="flex flex-col gap-2 -mt-1">
    @for (section of groupSections(); track section.pathKey) {
    <div class="overflow-hidden">
      <button type="button"
        class="flex w-full cursor-pointer items-center justify-between border-0 bg-[#e8ebed] rounded-[2px] py-2.5 px-3.5 text-left"
        (click)="sectionToggle.emit(section.key)" [attr.aria-expanded]="isSectionExpanded(section.key)">
        <span class="text-[14px] font-[600] text-[#112F5C]">{{ formatLabel(section.key) }}</span>
        <i class="pi shrink-0 text-[#112F5C] !text-[12px]" [class.pi-chevron-up]="isSectionExpanded(section.key)"
          [class.pi-chevron-down]="!isSectionExpanded(section.key)"></i>
      </button>
      @if (isSectionExpanded(section.key)) {
      <div class="border-t border-[#eef1f3] bg-white p-3.5">
        <app-json-structure-editor [nodes]="section.children" [values]="values()" [disabled]="disabled()" [depth]="1"
          (fieldChange)="fieldChange.emit($event)" />
      </div>
      }
    </div>
    }
  </div>
  }

  @if (!disabled() && showActions()) {
  <div class="flex justify-end">
    <button type="button" (click)="save.emit()" [disabled]="saving() || !dirty()"
      class="inline-flex cursor-pointer items-center rounded-[9px] bg-[#035BA9] px-4 py-2 text-[14px] font-[500] text-white disabled:cursor-not-allowed disabled:opacity-50">
      @if (saving()) {
      <i class="pi pi-spinner pi-spin mr-2"></i>
      }
      Save changes
    </button>
  </div>
  }
</div>
